<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فروشگاه ایثارگران</title>
<style>
body{
    font-family:tahoma;
    background:#0d1117;
    color:white;
    text-align:center;
    margin:0;
}

h1{
    color:#00bfff;
}

button{
    background:#00bfff;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.logo{
    width:140px;
    display:block;
    margin:0 auto 20px;
}

header{
    background:#161b22;
    width:80%;
    margin:auto;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,191,255,.3);
}

.subtitle{
    font-size:20px;
    color:#cccccc;
    margin-bottom:30px;
}
/* ===== Hero Section ===== */

.hero{
    height:500px;
    margin-top:40px;

    background:
        linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url("https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:#fff;

    border-radius:20px;
}

.hero-text{
    width:90%;
    max-width:800px;
}

.hero h1{
    font-size:48px;
    color:#fff;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    line-height:2;
    color:#ddd;
    margin-bottom:35px;
}

.btn{
    display:inline-block;

    padding:15px 35px;

    background:#00bfff;
    color:#fff;

    text-decoration:none;

    border-radius:8px;

    transition:0.3s;
}

.btn:hover{
    background:#0099cc;
    transform:translateY(-3px);
}
</style>
</head>
<body>

<header>

    <img src="لوگو.png" alt="لوگوی فروشگاه ایثارگران" class="logo">

    <h1>فروشگاه کامپیوتر ایثارگران</h1>

    <p class="subtitle">
        فروش تخصصی لپ‌تاپ، کیس، مانیتور، قطعات و لوازم جانبی کامپیوتر
    </p>

    <button>تماس با ما</button>

</header>
<section class="hero">
    <div class="hero-text">
        <h1>فروشگاه ایثارگران</h1>

        <p>
            عرضه کننده انواع قطعات و لوازم جانبی کامپیوتر، لپ‌تاپ،
            تجهیزات شبکه و لوازم دیجیتال با بهترین قیمت و ضمانت اصالت کالا
        </p>

        <a href="#products" class="btn">
            مشاهده محصولات
        </a>
    </div>
</section>
